seed_everything: true
trainer:
  accelerator: auto
  devices: auto
  precision: 16-mixed
  max_epochs: 50
  log_every_n_steps: 50
model:
  learning_rate: 0.0001
  mlp_layers:
    - 256
    - 64
  dropout: 0.2
  decoder: binary
data:
  dataset_path: null  # required: path to human_viewpoint_metric dataset
  batch_size: 16
  num_workers: 8
